name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 安裝 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安裝 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.3'

      - name: 檢查 Flutter
        run: flutter --version

      - name: 建立 Android 專案結構
        run: flutter create .

      - name: 安裝套件
        run: flutter pub get

      - name: 打包 APK
        run: flutter build apk --release

      - name: 上傳 APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
